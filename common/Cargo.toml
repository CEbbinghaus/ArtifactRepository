[package]
name = "common"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.100"
chrono = "0.4.41"
flate2 = { version = "1.1.5", features = ["zlib-rs"] }
futures = "0.3.31"
hex = "0.4.3"
lzma-rust2 = {version = "0.15.1", features = ["std"] }
opendal = "0.54.1"
serde = { version = "1.0.228", features = ["serde_derive"] }
sha2 = "0.10.9"
tokio = { version = "1.48.0", features = ["full"] }
